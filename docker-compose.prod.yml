# docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────────────────
# Configuración exclusiva para producción.
# NUNCA se aplica automáticamente. Requiere invocación explícita:
#
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Diferencias clave con desarrollo:
#   - Puerto de SQL Server NO expuesto al exterior (solo acceso interno)
#   - Swagger deshabilitado
#   - Política de reinicio: always
#   - Límites de recursos (CPU/RAM) activados
#   - Variables vienen de secretos o CI/CD, no de .env local
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── SQL Server en producción ──────────────────────────────────────────────
  db:
    # Sin exposición de puerto al exterior: solo el backend accede por red interna
    ports: []
    deploy:
      resources:
        limits:
          memory: 2g
    restart: always

  # ── db-init en producción ─────────────────────────────────────────────────
  db-init:
    restart: "no"

  # ── Backend en producción ─────────────────────────────────────────────────
  backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      SWAGGER_ENABLED: "false"
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always

  # ── Frontend en producción ────────────────────────────────────────────────
  frontend:
    deploy:
      resources:
        limits:
          memory: 128m
    restart: always
