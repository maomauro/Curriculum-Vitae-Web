# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Orquestador de servicios para PortalCV en entorno local/desarrollo.
# Levanta 3 contenedores: base de datos, backend y frontend.
#
# Uso:
#   Levantar solo BD:    docker-compose up -d db db-init
#   Levantar todo:       docker-compose --profile app up -d
#   Ver logs:            docker-compose logs -f
#   Detener todo:        docker-compose down
#   Detener + borrar BD: docker-compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. BASE DE DATOS (SQL Server) ──────────────────────────────────────────
  # Imagen oficial de Microsoft para SQL Server 2022 en Linux.
  # Es la misma base de datos que usas en desarrollo, ahora en contenedor.
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: portalcv-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
      TZ: UTC  # Recomendado para consistencia total en desarrollo
    ports:
      - "${PORT_DB}:1433"
    volumes:
      # Volumen persistente: los datos de la BD sobreviven al reinicio del contenedor
      - sqlserver_data:/var/opt/mssql
    networks:
      - portalcv-network
    healthcheck:
      # Verifica que SQL Server esté listo antes de levantar el backend
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P $$SA_PASSWORD -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 2. INICIALIZACIÓN DE BASE DE DATOS ────────────────────────────────────
  # Servicio temporal que corre UNA SOLA VEZ al primer docker-compose up.
  # Usa la misma imagen de SQL Server (ya tiene sqlcmd instalado).
  # Crea la BD PortalCV y ejecuta los scripts SQL en orden.
  # Cuando termina exitosamente, el backend recibe luz verde para arrancar.
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: portalcv-db-init
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      TZ: UTC
    volumes:
      # Monta la carpeta scripts/ local → /scripts dentro del contenedor
      - ./scripts:/scripts
    entrypoint: ["/bin/bash", "/scripts/init-db.sh"]
    depends_on:
      db:
        condition: service_healthy   # Espera a que SQL Server esté listo
    networks:
      - portalcv-network
    restart: "no"                    # Solo corre una vez, no reinicia

  # ── 3. BACKEND (.NET 10 API) ───────────────────────────────────────────────
  # Construye la imagen desde el Dockerfile en la carpeta backend/.
  # Solo arranca cuando la inicialización de BD completó exitosamente.
  backend:
    profiles: ["app"]
    build:
      context: ./backend          # Carpeta donde está el Dockerfile del backend
      dockerfile: Dockerfile
    container_name: portalcv-api
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=${DB_NAME};User Id=${APP_DB_USER};Password=${APP_DB_PASSWORD};TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: "http://+:8080"
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      TZ: UTC
      Jwt__Key: ${Jwt__Key}
      Auth__DemoUser__Email: ${Auth__DemoUser__Email}
      Auth__DemoUser__Password: ${Auth__DemoUser__Password}
    ports:
      - "${PORT_BACKEND}:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully  # Espera a que los scripts SQL terminen
    networks:
      - portalcv-network

  # ── 4. FRONTEND (Angular + Nginx) ──────────────────────────────────────────
  # Construye la imagen desde el Dockerfile en la carpeta frontend/.
  # Solo depende del backend para que la URL de la API esté disponible.
  frontend:
    profiles: ["app"]
    build:
      context: ./frontend         # Carpeta donde está el Dockerfile del frontend
      dockerfile: Dockerfile
    container_name: portalcv-web
    ports:
      - "${PORT_FRONTEND}:80"
    depends_on:
      - backend
    networks:
      - portalcv-network

# ─── VOLÚMENES ────────────────────────────────────────────────────────────────
# Los volúmenes persisten datos aunque el contenedor se detenga o elimine.
volumes:
  sqlserver_data:
    name: portalcv-sqlserver-data

# ─── RED INTERNA ──────────────────────────────────────────────────────────────
# Todos los servicios comparten una red privada.
# Se comunican entre sí por nombre de servicio (ej: "db", "backend").
networks:
  portalcv-network:
    name: portalcv-network
    driver: bridge
