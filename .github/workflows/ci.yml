name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencias
        run: dotnet restore backend/PortalCV.Backend/PortalCV.Backend.slnx

      - name: Build
        run: >
          dotnet build backend/PortalCV.Backend/PortalCV.Backend.slnx
          --no-restore
          --configuration Release

      # TODO (HS-XX): agregar proyecto de tests cuando esté disponible
      # - name: Tests
      #   run: >
      #     dotnet test backend/PortalCV.Backend/PortalCV.Backend.slnx
      #     --no-build --configuration Release
      #     --logger "trx;LogFileName=results.trx"
      # - name: Publicar resultados
      #   uses: dorny/test-reporter@v1
      #   if: always()
      #   with:
      #     name: Backend Tests
      #     path: "**/*.trx"
      #     reporter: dotnet-trx

  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build (producción)
        run: npm run build -- --configuration production

      - name: Tests unitarios (headless)
        run: npm test -- --configuration ci
