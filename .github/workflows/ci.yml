name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencias
        run: dotnet restore backend/PortalCV.Backend/PortalCV.Backend.slnx

      - name: Build
        run: >
          dotnet build backend/PortalCV.Backend/PortalCV.Backend.slnx
          --no-restore
          --configuration Release

      # TODO (HS-XX): agregar proyecto de tests cuando esté disponible
      # - name: Tests
      #   run: >
      #     dotnet test backend/PortalCV.Backend/PortalCV.Backend.slnx
      #     --no-build --configuration Release
      #     --logger "trx;LogFileName=results.trx"
      # - name: Publicar resultados
      #   uses: dorny/test-reporter@v1
      #   if: always()
      #   with:
      #     name: Backend Tests
      #     path: "**/*.trx"
      #     reporter: dotnet-trx

  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build (producción)
        run: npm run build -- --configuration production

      - name: Tests unitarios (headless)
        run: npm run test -- --configuration=ci

  # ─────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud (quality gate)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud config
        id: sonar-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud no configurado: define SONAR_TOKEN (secret), SONAR_ORGANIZATION y SONAR_PROJECT_KEY (variables)."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "SonarCloud configurado."
          fi

      - name: Sonar scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=backend,frontend
            -Dsonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/dist/**,**/.angular/**

      - name: Sonar quality gate
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
