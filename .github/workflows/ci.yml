name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencias
        run: dotnet restore backend/PortalCV.Backend/PortalCV.Backend.slnx

      - name: Build
        run: >
          dotnet build backend/PortalCV.Backend/PortalCV.Backend.slnx
          --no-restore
          --configuration Release

      - name: Tests unitarios e integración
        run: >
          dotnet test backend/PortalCV.Backend/PortalCV.Api.Tests/PortalCV.Api.Tests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=backend-tests.trx"
          --results-directory backend/TestResults

      - name: Subir resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/TestResults/*.trx
          if-no-files-found: ignore
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build (producción)
        run: npm run build -- --configuration production

      - name: Tests unitarios (headless + coverage)
        run: npm run test -- --configuration=ci

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/portalcv-web/lcov.info
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud (quality gate)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar reporte de cobertura del frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/portalcv-web

      - name: Validate SonarCloud config
        id: sonar-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud no configurado: define SONAR_TOKEN (secret), SONAR_ORGANIZATION y SONAR_PROJECT_KEY (variables)."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "SonarCloud configurado."
          fi

      - name: Sonar scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=backend,frontend
            -Dsonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/dist/**,**/.angular/**,**/*.spec.ts
            -Dsonar.tests=frontend/src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/portalcv-web/lcov.info
            -Dsonar.coverage.exclusions=backend/**,**/*.spec.ts,**/main.ts,**/environments/**,**/*.module.ts,**/*.routes.ts,**/polyfills.ts
