name: Publish backend image to GHCR

# Publica la imagen Docker del backend en GitHub Container Registry (GHCR).
# Se dispara automaticamente cuando un PR hacia main se mergea, o manualmente
# desde la pestaña Actions con "Run workflow" si se necesita rebuild.
#
# La imagen final es:
#   ghcr.io/<owner>/portalcv-backend:latest
#   ghcr.io/<owner>/portalcv-backend:sha-<short-sha>
#
# Los comandos `az` del runbook (docs/devops/Runbook-Azure.md) apuntan a
# `ghcr.io/<owner>/portalcv-backend:latest`.
#
# Tras un push exitoso a `main`, el job `deploy-aca` actualiza Azure Container Apps
# con el digest exacto de la imagen recien publicada (evita imagen obsoleta en ACA).

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/publish-backend-image.yml"
  workflow_dispatch:

# Evita publicar dos imagenes simultaneas con el mismo tag si llegan dos merges
# muy seguidos; mantiene solo la ultima en progreso.
concurrency:
  group: publish-backend-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/portalcv-backend
  # Azure Container Apps (ajustar si el RG o nombre de app cambian; ver Runbook-Azure.md)
  ACA_RESOURCE_GROUP: CV-Mao
  ACA_APP_NAME: portalcv-api

jobs:
  publish:
    name: Build & push backend image
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # Sin cache remota GHA: evita imagenes "latest" con DLL antiguos cuando el
      # cache de Buildx reutiliza capas de `dotnet publish` de un commit anterior
      # (sintoma: /health 404 en ACA aunque main ya tenga MapHealthChecks).
      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

      - name: Resumen de la publicacion
        run: |
          echo "## Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-aca:
    name: Deploy backend to Azure Container Apps
    needs: publish
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' &&
      needs.publish.outputs.image_digest != ''

    permissions:
      contents: read

    steps:
      # No usar fromJSON(secrets...) en `with:` del action: GitHub puede validar el
      # workflow con el secret vacio y falla con "Error reading JToken... line 0".
      # El JSON se parsea en runtime con Python (mismo formato --json-auth de az cli).
      - name: Azure CLI login (service principal)
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -euo pipefail
          python3 << 'EOF'
          import json, os, subprocess
          raw = os.environ.get("AZURE_CREDENTIALS", "").strip()
          if not raw:
              raise SystemExit("AZURE_CREDENTIALS vacio: crea el secret en Settings > Secrets > Actions")
          c = json.loads(raw)
          subprocess.run(
              [
                  "az", "login", "--service-principal",
                  "-u", c["clientId"],
                  "-p", c["clientSecret"],
                  "--tenant", c["tenantId"],
              ],
              check=True,
          )
          subprocess.run(
              ["az", "account", "set", "--subscription", c["subscriptionId"]],
              check=True,
          )
          print("Azure login OK")
          EOF

      - name: Install Azure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Update Container App (imagen por digest)
        env:
          DIGEST: ${{ needs.publish.outputs.image_digest }}
        run: |
          set -euo pipefail
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
          echo "Actualizando ACA con imagen: ${IMAGE_REF}"
          az containerapp update \
            --name "${ACA_APP_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --image "${IMAGE_REF}"

      - name: Resumen despliegue ACA
        if: success()
        run: |
          {
            echo "## Despliegue Azure Container Apps"
            echo ""
            echo "Imagen desplegada: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.publish.outputs.image_digest }}\`"
            echo ""
            echo "| Recurso | Valor |"
            echo "|---------|-------|"
            echo "| Container App | \`${{ env.ACA_APP_NAME }}\` |"
            echo "| Resource group | \`${{ env.ACA_RESOURCE_GROUP }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
