name: Publish backend image to GHCR

# Publica la imagen Docker del backend en GitHub Container Registry (GHCR).
# Se dispara automaticamente cuando un PR hacia main se mergea, o manualmente
# desde la pestaña Actions con "Run workflow" si se necesita rebuild.
#
# La imagen final es:
#   ghcr.io/<owner>/portalcv-backend:latest
#   ghcr.io/<owner>/portalcv-backend:sha-<short-sha>
#
# Los comandos `az` del runbook (docs/devops/Runbook-Azure.md) apuntan a
# `ghcr.io/<owner>/portalcv-backend:latest`.

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/publish-backend-image.yml"
  workflow_dispatch:

# Evita publicar dos imagenes simultaneas con el mismo tag si llegan dos merges
# muy seguidos; mantiene solo la ultima en progreso.
concurrency:
  group: publish-backend-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/portalcv-backend

jobs:
  publish:
    name: Build & push backend image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen de la publicacion
        run: |
          echo "## Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
