<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse — PortalCV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css">
  <style>
    /* AdminLTE 4 — AuthLayout */
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #E9ECEF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .login-logo a {
      color: #2C7BE5;
      font-size: 2rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: -.5px;
    }
    .login-logo a b { color: #212529; }

    .login-box .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .login-card-body { padding: 32px 28px; }

    .login-box-msg {
      text-align: center;
      color: #6C757D;
      font-size: .95rem;
      margin-bottom: 24px;
    }

    .input-group-text {
      background: #fff;
      border-left: none;
      color: #6C757D;
    }

    .btn-register {
      background: #2C7BE5;
      border: none;
      font-weight: 600;
      padding: 11px;
      border-radius: 8px;
    }
    .btn-register:hover { background: #1a6bd4; }

    .link-secondary-text {
      font-size: .875rem;
      color: #6C757D;
      text-align: center;
    }
    .link-secondary-text a { color: #2C7BE5; text-decoration: none; font-weight: 600; }
    .link-secondary-text a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-box">

    <!-- Logo -->
    <div class="login-logo">
      <a href="../publica/home.html"><b>Portal</b>CV</a>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-body login-card-body">

        <p class="login-box-msg">Crea tu cuenta gratuita</p>

        <form>
          <!-- Nombre completo -->
          <div class="input-group mb-3">
            <input
              type="text"
              class="form-control"
              placeholder="Nombre completo"
              value="Ana García"
            >
            <div class="input-group-text">
              <i class="bi bi-person-fill"></i>
            </div>
          </div>

          <!-- Email -->
          <div class="input-group mb-3">
            <input
              type="email"
              class="form-control"
              placeholder="Correo electrónico"
              value="ana.garcia@email.com"
            >
            <div class="input-group-text">
              <i class="bi bi-envelope"></i>
            </div>
          </div>

          <!-- Contraseña -->
          <div class="input-group mb-4">
            <input
              type="password"
              class="form-control"
              placeholder="Contraseña"
              value="••••••••"
            >
            <div class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </div>
          </div>

          <!-- Botón -->
          <button type="submit" class="btn btn-register btn-primary w-100 text-white">
            <i class="bi bi-person-plus-fill me-2"></i>Registrarse
          </button>
        </form>

        <!-- Link login -->
        <p class="link-secondary-text mt-4 mb-0">
          ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </p>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
